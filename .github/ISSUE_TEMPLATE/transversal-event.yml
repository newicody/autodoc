name: Nouvelle recherche transversale liée
description: Créer un événement indépendant à partir de plusieurs recherches ou thèmes.
title: "[Événement lié] "
labels: []
body:
  - type: markdown
    attributes:
      value: |
        Cet événement devient une recherche indépendante. Il conserve cependant
        les références hiérarchiques de ses recherches, thèmes et événements sources.

  - type: textarea
    id: event_objective
    attributes:
      label: Question ou objectif de l'événement
      placeholder: Quelle recherche indépendante doit être menée ?
    validations:
      required: true

  - type: textarea
    id: origin_research
    attributes:
      label: Recherche d'origine
      description: Ticket principal ayant conduit à cet événement.
      placeholder: "#12"
    validations:
      required: true

  - type: textarea
    id: selected_themes
    attributes:
      label: Thèmes sélectionnés
      description: Ajouter un thème, un ticket de thème ou une URL par ligne.
      placeholder: |
        Chalouf
        #30
        Architecture réseau
    validations:
      required: true

  - type: textarea
    id: selected_researches
    attributes:
      label: Tickets et recherches sélectionnés
      placeholder: Une référence ou une URL par ligne.

  - type: textarea
    id: selected_repositories
    attributes:
      label: Dépôts sélectionnés
      placeholder: Un dépôt ou une URL par ligne.

  - type: textarea
    id: selected_documents
    attributes:
      label: Documents, médias et liens sélectionnés
      description: Déposer des fichiers ou ajouter des URL.

  - type: textarea
    id: parent_event
    attributes:
      label: Événement parent ou précédent
      description: Référence facultative conservant la filiation entre événements.

  - type: dropdown
    id: context_mode
    attributes:
      label: Niveau de contexte
      options:
        - Complet
        - Condensé
        - Minimal
    validations:
      required: true

  - type: checkboxes
    id: next_cycle_exclusions
    attributes:
      label: Éléments à exclure de cet événement
      options:
        - label: Exclure les résultats antérieurs des recherches sélectionnées
        - label: Exclure les commentaires anciens
        - label: Exclure les pièces jointes anciennes
        - label: Exclure les résultats d'inférence externe antérieurs

  - type: checkboxes
    id: external_inference
    attributes:
      label: Inférence externe
      options:
        - label: Lancer également une inférence sur un moteur externe

  - type: textarea
    id: external_inference_details
    attributes:
      label: Précisions pour l'inférence externe
      placeholder: Ne jamais placer de token ou de secret dans ce champ.
