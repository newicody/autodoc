# Dedicated GitHub Actions artifact scan configuration.
# Keep this separate from the ProjectV2 query-only snapshot configuration.

[github]
token_env = GITHUB_TOKEN
api_url = https://api.github.com

[project]
url = https://github.com/users/newicody/projects/3
owner = newicody
number = 3

[artifact_source]
repositories = newicody/projects
workflow_name = autodoc-controlled-research.yml
artifact_name_prefix = autodoc-
trigger_source = github_action_on_ticket_event

[scan]
mode = fcron
interval_minutes = 10
working_directory = /home/eric/projet/git/autodoc
python_executable = /home/eric/python/bin/python
scan_command = tools/run_github_actions_artifact_scan_once_live_0272.py
state_path = .var/github/actions_artifacts/state/index.json
inbox_dir = .var/github/actions_artifacts/inbox
fcron_table_path = .var/fcron/autodoc-github-actions-artifact-scan.fcrontab

[safety]
development_repository = newicody/autodoc
allowed_repositories = newicody/projects
read_only_scan = true
query_only = true
graphql_mutation_allowed = false
allow_workflow_dispatch = false
allow_remote_mutation = false
allow_sql_write = false
allow_qdrant_write = false

[pipeline]
context_option_names = include_current_ticket, include_total_project, include_repository_context, include_linked_tickets, include_recent_artifacts
copilot_preliminary_opinion = true
history_mode = append_only
