[workflow_dispatch]
# Outbound connector only: dispatch the workflow owned by newicody/projects.
repository = newicody/projects
workflow_name = autodoc-controlled-research.yml
ref = master
token_env = GITHUB_TOKEN
api_url = https://api.github.com
target_status = En cours
change_set_dir = .var/github/project_v2/changes
state_path = .var/github/project_v2/state/en_cours_dispatch_0275_r8.json
report_path = .var/reports/github_project_v2_en_cours_dispatch_0275_r8.json
max_dispatches = 10

# Safe example defaults. Enable both gates only in the local .var/config copy,
# together with --execute and a non-empty policy decision id.
allow_workflow_dispatch = false
allow_remote_mutation = false
