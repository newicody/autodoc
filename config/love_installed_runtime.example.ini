# Copy to .var/config/love_installed_runtime.ini and keep it out of Git.
# Machine-specific PostgreSQL, Qdrant and OpenVINO coordinates live here.
# Secrets remain in environment variables and are never serialized.

[provider]
# Leave this empty to select the canonical provider automatically.
# Canonical default: context.love_manual_installed_runtime_provider_0287:build_installed_runtime_ports
# A non-empty value is reserved for an installation-owned compatible provider.
factory =

[runtime]
schema = missipy.love.installed_runtime_factory_configuration.v1
runtime_ref = runtime:love-installed

[manual-runtime]
schema = missipy.love.manual_installed_runtime_configuration.v1

[scheduler]
scheduler_ref = scheduler:main
# Reuse the live server Scheduler. The provider never constructs another one.
lifecycle = externally-managed

[sql]
authority_ref = sql-authority:context-revisions
base_revision_ref = context-revision:love-base

[projection]
backend_ref = projection:context-revision-sql-authority

[embedding]
backend_ref = openvino:multilingual-e5-small
model_ref = model:multilingual-e5-small
model_revision = installed
dimension = 384

[postgresql]
host = 127.0.0.1
port = 5432
database = autodoc
user = autodoc
password_env = AUTODOC_POSTGRES_PASSWORD
sslmode = disable
schema = autodoc
connect_timeout_seconds = 5

[qdrant]
backend_ref = qdrant:local
url = http://127.0.0.1:6333
grpc_port = 6334
api_key_env =
# Legacy/current logical target retained for compatibility.
collection = autodoc_context_current
# Canonical physical hybrid collection created by the controlled r10 path.
physical_collection = autodoc_context_e5_384_hybrid_v1
# Alias activation is deferred until the collection is validated.
collection_alias = autodoc_context_hybrid_current
# Legacy unnamed/single-vector selector remains empty.
vector_name =
# Canonical named vector spaces.
dense_vector_name = dense_e5_v1
sparse_vector_name = sparse_lexical_v1
dimension = 384
distance = Cosine
timeout_seconds = 5

[openvino]
model_dir = /home/eric/model/openvino/multilingual-e5-small
model_xml = /home/eric/model/openvino/multilingual-e5-small/openvino_model.xml
device = CPU
dimension = 384
query_prefix = query:
passage_prefix = passage:

[evidence]
# Durable refs are completed after the live bootstrap registers the exact ports.
refs = config:love-installed-runtime,service:postgresql-18,service:qdrant,model:multilingual-e5-small
# r10-r1: direct Python callers may omit the named-vector fields; INI users keep them explicit.
