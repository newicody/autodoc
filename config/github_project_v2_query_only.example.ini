[github]
token_env = GITHUB_TOKEN
api_url = https://api.github.com

[project]
url = https://github.com/users/newicody/projects/2
owner = newicody
number = 2
id = PVT_kwHOA3ouXM4Ba3Ar
view_number_hint = 2
kind = user_project_v2
source_mode = project_v2_query_only_snapshot

# Kept only so the existing 0165 ConfigObj-style loader remains reusable.
# The Actions artifact path is secondary and is not contacted by the snapshot CLI.
[artifact_source]
repositories = newicody/autodoc-ideas
workflow_name = autodoc-ticket-artifact.yml
artifact_name_prefix = autodoc-ticket-artifact-
trigger_source = github_action_on_ticket_event

[scan]
mode = fcron
interval_minutes = 10
working_directory = /home/eric/projet/git/autodoc
python_executable = /home/eric/python/bin/python
scan_command = tools/run_github_project_v2_query_only_snapshot_0272.py --execute --policy-decision-id policy:0272:fcron-project-v2-query-only
state_path = .var/github/project_v2/state/index.json
inbox_dir = .var/github/project_v2/snapshots
fcron_table_path = .var/fcron/autodoc-github-project-v2-snapshot.fcrontab

[project_snapshot]
graphql_url = https://api.github.com/graphql
output_dir = .var/github/project_v2/snapshots
page_size = 50
max_items = 500
max_pages = 20

[safety]
development_repository = newicody/autodoc
allowed_repositories = newicody/autodoc-ideas
read_only_scan = true
query_only = true
graphql_mutation_allowed = false
allow_workflow_dispatch = false
allow_remote_mutation = false
allow_sql_write = false
allow_qdrant_write = false

[pipeline]
context_option_names = include_current_ticket, include_total_project, include_repository_context, include_linked_tickets, include_recent_artifacts
copilot_preliminary_opinion = true
copilot_opinion_policy = advisory_only
history_mode = append_only

[deployment_readiness]
# Query-only test of an already-installed/deployed system. This section never installs or deploys.
workflow_repository = newicody/autodoc-ideas
workflow_name = autodoc-ticket-artifact.yml
workflow_path = .github/workflows/autodoc-ticket-artifact.yml
workflow_template_path = templates/github/autodoc-ticket-artifact.yml
builder_path = scripts/build_autodoc_ticket_artifact.py
builder_template_path = templates/github/scripts/build_autodoc_ticket_artifact.py
snapshot_tool_path = tools/run_github_project_v2_query_only_snapshot_0272.py
change_detection_tool_path = tools/detect_github_project_v2_snapshot_changes_0272.py
report_dir = .var/reports
require_actions_deployment = true
