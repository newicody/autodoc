name: Autodoc controlled research request

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: Numéro de l'issue à traiter dans newicody/projects
        required: true
        type: string
      requested_status:
        description: Intention correspondant à la colonne Status
        required: true
        type: choice
        options:
          - Recherche
          - Développement
          - Production
      request_mode:
        description: Nature du cycle
        required: true
        type: choice
        options:
          - initial
          - continuation
          - transversal
      parent_event_ref:
        description: Événement parent ou précédent, si applicable
        required: false
        type: string

permissions:
  contents: read
  issues: read
  actions: read
  copilot-requests: write

jobs:
  build-dual-artifacts:
    runs-on: ubuntu-latest
    env:
      AUTODOC_COPILOT_CLI_VERSION: "1.0.70"
      AUTODOC_COPILOT_CLI_PREFIX: ${{ github.workspace }}/.cache/copilot-cli

    steps:
      - name: Checkout Autodoc runtime
        uses: actions/checkout@v6
        with:
          repository: newicody/autodoc
          ref: master
          path: autodoc-runtime
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Prepare output directory
        shell: bash
        run: mkdir -p out

      - name: Read selected issue
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_REPOSITORY: ${{ github.repository }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
        shell: bash
        run: |
          set -euo pipefail
          if ! gh api "repos/${ISSUE_REPOSITORY}/issues/${ISSUE_NUMBER}" > out/issue.json
          then
            echo "::error::Issue ${ISSUE_REPOSITORY}#${ISSUE_NUMBER} introuvable ou inaccessible."
            exit 1
          fi

      - name: Build controlled issue event
        env:
          AUTODOC_ISSUE_JSON: ${{ github.workspace }}/out/issue.json
          AUTODOC_EVENT_OUTPUT: ${{ github.workspace }}/out/autodoc_issue_event.json
          AUTODOC_REQUESTED_STATUS: ${{ inputs.requested_status }}
          AUTODOC_REQUEST_MODE: ${{ inputs.request_mode }}
          AUTODOC_PARENT_EVENT_REF: ${{ inputs.parent_event_ref }}
        run: >
          python
          autodoc-runtime/templates/github/projects-repository/scripts/build_workflow_dispatch_issue_event.py

      - name: Build authoritative request
        env:
          AUTODOC_EVENT_PATH: ${{ github.workspace }}/out/autodoc_issue_event.json
          AUTODOC_OUTPUT: ${{ github.workspace }}/out/authoritative_request.json
        run: >
          python
          autodoc-runtime/templates/github/scripts/build_autodoc_authoritative_request.py

      - name: Restore pinned Copilot CLI
        id: autodoc-copilot-cli-cache
        if: ${{ vars.AUTODOC_COPILOT_ADVISORY_ENABLED == 'true' }}
        uses: actions/cache@v4
        with:
          path: ${{ env.AUTODOC_COPILOT_CLI_PREFIX }}
          key: >-
            autodoc-copilot-cli-v1-${{ runner.os }}-${{ runner.arch }}-${{
            env.AUTODOC_COPILOT_CLI_VERSION }}

      - name: Install pinned Copilot CLI on cache miss
        if: >-
          ${{ vars.AUTODOC_COPILOT_ADVISORY_ENABLED == 'true'
          && steps.autodoc-copilot-cli-cache.outputs.cache-hit != 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          npm install             --prefix "$AUTODOC_COPILOT_CLI_PREFIX"             --no-audit             --no-fund             --omit=dev             "@github/copilot@$AUTODOC_COPILOT_CLI_VERSION"

      - name: Verify pinned Copilot CLI
        if: ${{ vars.AUTODOC_COPILOT_ADVISORY_ENABLED == 'true' }}
        env:
          COPILOT_AUTO_UPDATE: "false"
        shell: bash
        run: |
          set -euo pipefail
          actual_version="$(
            node -p               "require(process.env.AUTODOC_COPILOT_CLI_PREFIX +               '/node_modules/@github/copilot/package.json').version"
          )"
          test "$actual_version" = "$AUTODOC_COPILOT_CLI_VERSION"
          test -x             "$AUTODOC_COPILOT_CLI_PREFIX/node_modules/.bin/copilot"
          "$AUTODOC_COPILOT_CLI_PREFIX/node_modules/.bin/copilot"             --version

      - name: Build optional Copilot advisory
        if: ${{ vars.AUTODOC_COPILOT_ADVISORY_ENABLED == 'true' }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
          COPILOT_AUTO_UPDATE: "false"
          AUTODOC_COPILOT_COMMAND: >-
            ${{ env.AUTODOC_COPILOT_CLI_PREFIX }}/node_modules/.bin/copilot
          AUTODOC_COPILOT_REQUIRED: "false"
          AUTODOC_REQUEST: ${{ github.workspace }}/out/authoritative_request.json
          AUTODOC_ADVISORY: ${{ github.workspace }}/out/copilot_advisory.json
        run: >
          python
          autodoc-runtime/templates/github/scripts/run_autodoc_copilot_advisory.py

      - name: Build linking manifest
        env:
          AUTODOC_REQUEST: ${{ github.workspace }}/out/authoritative_request.json
          AUTODOC_ADVISORY: ${{ github.workspace }}/out/copilot_advisory.json
          AUTODOC_MANIFEST: ${{ github.workspace }}/out/dual_artifact_manifest.json
        run: >
          python
          autodoc-runtime/templates/github/scripts/build_autodoc_dual_manifest.py

      - name: Upload authoritative request
        uses: actions/upload-artifact@v7
        with:
          name: autodoc-authoritative-request
          path: out/authoritative_request.json
          if-no-files-found: error

      - name: Upload optional Copilot advisory
        if: ${{ hashFiles('out/copilot_advisory.json') != '' }}
        uses: actions/upload-artifact@v7
        with:
          name: autodoc-copilot-advisory
          path: out/copilot_advisory.json
          if-no-files-found: error

      - name: Upload manifest
        uses: actions/upload-artifact@v7
        with:
          name: autodoc-dual-artifact-manifest
          path: out/dual_artifact_manifest.json
          if-no-files-found: error
