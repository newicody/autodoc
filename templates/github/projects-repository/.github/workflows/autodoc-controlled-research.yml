name: Autodoc controlled research request

on:
  issues:
    types:
      - opened
permissions:
  contents: read
  issues: read
  actions: read
  copilot-requests: write

jobs:
  build-dual-artifacts:
    if: >-
      ${{
        github.repository == 'newicody/projects'
        && github.event_name == 'issues'
        && github.event.action == 'opened'
        && (
          startsWith(github.event.issue.title, '[Recherche] ')
          || (
            contains(github.event.issue.body, '### Question ou objectif')
            && contains(github.event.issue.body, '### Résultat attendu')
          )
        )
      }}
    runs-on: ubuntu-latest
    env:
      AUTODOC_COPILOT_CLI_VERSION: "1.0.70"
      AUTODOC_COPILOT_CLI_PREFIX: ${{ github.workspace }}/.cache/copilot-cli
      AUTODOC_ISSUE_NUMBER: ${{ github.event.issue.number }}
      AUTODOC_REQUESTED_STATUS_RESOLVED: "Recherche"
      AUTODOC_REQUEST_MODE_RESOLVED: "initial"
      AUTODOC_PARENT_EVENT_REF_RESOLVED: ""
      AUTODOC_COPILOT_REQUIRED_RESOLVED: "true"

    steps:
      - name: Checkout Autodoc runtime
        uses: actions/checkout@v6
        with:
          repository: newicody/autodoc
          path: autodoc-runtime

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Prepare output directory
        run: mkdir -p out

      - name: Read selected issue
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ env.AUTODOC_ISSUE_NUMBER }}
        run: >
          gh api
          "repos/${GITHUB_REPOSITORY}/issues/${ISSUE_NUMBER}"
          > out/issue.json

      - name: Build controlled issue event
        env:
          AUTODOC_ISSUE_JSON: out/issue.json
          AUTODOC_EVENT_OUTPUT: out/autodoc_issue_event.json
          AUTODOC_REQUESTED_STATUS: ${{ env.AUTODOC_REQUESTED_STATUS_RESOLVED }}
          AUTODOC_REQUEST_MODE: ${{ env.AUTODOC_REQUEST_MODE_RESOLVED }}
          AUTODOC_PARENT_EVENT_REF: ${{ env.AUTODOC_PARENT_EVENT_REF_RESOLVED }}
        run: >
          python
          autodoc-runtime/templates/github/projects-repository/scripts/build_workflow_dispatch_issue_event.py

      - name: Normalize event and build authoritative request
        env:
          AUTODOC_ISSUE_JSON: ${{ github.workspace }}/out/issue.json
          AUTODOC_EVENT_PATH: ${{ github.workspace }}/out/autodoc_issue_event.json
          AUTODOC_NORMALIZED_EVENT_OUTPUT: >-
            ${{ github.workspace }}/out/normalized_autodoc_issue_event.json
          AUTODOC_OUTPUT: ${{ github.workspace }}/out/authoritative_request.json
        run: >
          python
          autodoc-runtime/templates/github/projects-repository/scripts/run_workflow_dispatch_authoritative_request.py

      - name: Preserve controlled research intention
        env:
          AUTODOC_REQUEST: ${{ github.workspace }}/out/authoritative_request.json
          AUTODOC_EVENT_PATH: ${{ github.workspace }}/out/autodoc_issue_event.json
          AUTODOC_OUTPUT: ${{ github.workspace }}/out/authoritative_request.json
        run: >
          python
          autodoc-runtime/templates/github/projects-repository/scripts/enrich_authoritative_request_research_intention.py

      - name: Restore pinned Copilot CLI
        id: autodoc-copilot-cli-cache
        uses: actions/cache@v4
        with:
          path: ${{ env.AUTODOC_COPILOT_CLI_PREFIX }}
          key: >-
            autodoc-copilot-cli-v1-${{ runner.os }}-${{ runner.arch }}-${{
            env.AUTODOC_COPILOT_CLI_VERSION }}

      - name: Install pinned Copilot CLI on cache miss
        if: >-
          ${{
            steps.autodoc-copilot-cli-cache.outputs.cache-hit != 'true'
          }}
        shell: bash
        run: |
          set -euo pipefail
          npm install             --prefix "$AUTODOC_COPILOT_CLI_PREFIX"             --no-audit             --no-fund             --omit=dev             "@github/copilot@$AUTODOC_COPILOT_CLI_VERSION"

      - name: Verify pinned Copilot CLI
        env:
          COPILOT_AUTO_UPDATE: "false"
        shell: bash
        run: |
          set -euo pipefail
          actual_version="$(
            node -p               "require(process.env.AUTODOC_COPILOT_CLI_PREFIX +               '/node_modules/@github/copilot/package.json').version"
          )"
          test "$actual_version" = "$AUTODOC_COPILOT_CLI_VERSION"
          test -x             "$AUTODOC_COPILOT_CLI_PREFIX/node_modules/.bin/copilot"
          "$AUTODOC_COPILOT_CLI_PREFIX/node_modules/.bin/copilot"             --version

      - name: Build optional Copilot advisory
        env:
          GITHUB_TOKEN: ${{ github.token }}
          COPILOT_AUTO_UPDATE: "false"
          AUTODOC_COPILOT_COMMAND: >-
            ${{ env.AUTODOC_COPILOT_CLI_PREFIX }}/node_modules/.bin/copilot
          AUTODOC_COPILOT_REQUIRED: ${{ env.AUTODOC_COPILOT_REQUIRED_RESOLVED }}
          AUTODOC_REQUEST: out/authoritative_request.json
          AUTODOC_ADVISORY: out/copilot_advisory.json
        run: >
          python
          autodoc-runtime/templates/github/scripts/run_autodoc_copilot_advisory.py

      - name: Build linking manifest
        env:
          AUTODOC_REQUEST: out/authoritative_request.json
          AUTODOC_ADVISORY: out/copilot_advisory.json
          AUTODOC_MANIFEST: out/dual_artifact_manifest.json
        run: >
          python
          autodoc-runtime/templates/github/scripts/build_autodoc_dual_manifest.py

      - name: Build human-readable artifact identities
        id: artifact-identity
        env:
          AUTODOC_ISSUE_JSON: out/issue.json
          AUTODOC_REQUEST: out/authoritative_request.json
          AUTODOC_ADVISORY: out/copilot_advisory.json
          AUTODOC_MANIFEST: out/dual_artifact_manifest.json
          AUTODOC_ARTIFACT_IDENTITY: out/artifact_identity.json
        run: >
          python
          autodoc-runtime/templates/github/projects-repository/scripts/build_human_readable_artifact_identity.py

      # Legacy fixed names remain indexed in artifact_identity.json and are
      # accepted by the local importer for historical runs:
      # - autodoc-authoritative-request
      # - autodoc-copilot-advisory
      # - autodoc-dual-artifact-manifest
      - name: Upload authoritative request
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.artifact-identity.outputs.request_name }}
          path: out/authoritative_request.json
          if-no-files-found: error

      - name: Upload optional Copilot advisory
        if: ${{ hashFiles('out/copilot_advisory.json') != '' }}
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.artifact-identity.outputs.advisory_name }}
          path: out/copilot_advisory.json
          if-no-files-found: error

      - name: Upload manifest
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.artifact-identity.outputs.manifest_name }}
          path: |
            out/dual_artifact_manifest.json
            out/artifact_identity.json
          if-no-files-found: error

      # Projects owns the first advisory publication. The default GITHUB_TOKEN
      # remains read-only for Issues; only this bounded step receives the
      # dedicated repository secret with Issues: read/write permission.
      - name: Require Projects Issue comment token
        if: ${{ hashFiles('out/copilot_advisory.json') != '' }}
        shell: bash
        env:
          AUTODOC_ISSUE_COMMENT_TOKEN: ${{ secrets.AUTODOC_ISSUE_COMMENT_TOKEN }}
        run: |
          set -euo pipefail
          test -n "$AUTODOC_ISSUE_COMMENT_TOKEN"

      - name: Build Projects-owned Copilot advisory preview
        if: ${{ hashFiles('out/copilot_advisory.json') != '' }}
        shell: bash
        env:
          ISSUE_NUMBER: ${{ env.AUTODOC_ISSUE_NUMBER }}
        run: |
          set -euo pipefail
          python \
            autodoc-runtime/templates/github/projects-repository/scripts/build_copilot_advisory_v2_publication_preview.py \
            --advisory out/copilot_advisory.json \
            --request out/authoritative_request.json \
            --manifest out/dual_artifact_manifest.json \
            --run-id "$GITHUB_RUN_ID" \
            --repository "$GITHUB_REPOSITORY" \
            --issue-number "$ISSUE_NUMBER" \
            --output out/copilot_advisory_v2_publication_preview.json

      - name: Plan Projects-owned Copilot advisory comment
        if: ${{ hashFiles('out/copilot_advisory.json') != '' }}
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.AUTODOC_ISSUE_COMMENT_TOKEN }}
          ISSUE_NUMBER: ${{ env.AUTODOC_ISSUE_NUMBER }}
        run: |
          set -euo pipefail
          python \
            autodoc-runtime/tools/publish_github_copilot_advisory_v2_issue_comment_0287.py \
            --repository "$GITHUB_REPOSITORY" \
            --issue-number "$ISSUE_NUMBER" \
            --preview out/copilot_advisory_v2_publication_preview.json \
            --policy-decision-id "policy:projects:copilot-advisory:${GITHUB_RUN_ID}" \
            --operator-decision approve \
            --format json \
            > out/copilot_issue_comment_plan.json
          jq -e '.plan.valid == true' out/copilot_issue_comment_plan.json >/dev/null
          jq -er '.plan.plan_digest' out/copilot_issue_comment_plan.json \
            > out/copilot_issue_comment_plan_digest.txt

      - name: Publish Projects-owned Copilot advisory comment
        if: ${{ hashFiles('out/copilot_advisory.json') != '' }}
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.AUTODOC_ISSUE_COMMENT_TOKEN }}
          ISSUE_NUMBER: ${{ env.AUTODOC_ISSUE_NUMBER }}
          AUTODOC_REMOTE_MUTATION_ALLOWED: "true"
          AUTODOC_ISSUE_PUBLICATION_ALLOWED: "true"
        run: |
          set -euo pipefail
          plan_digest="$(cat out/copilot_issue_comment_plan_digest.txt)"
          python \
            autodoc-runtime/tools/publish_github_copilot_advisory_v2_issue_comment_0287.py \
            --repository "$GITHUB_REPOSITORY" \
            --issue-number "$ISSUE_NUMBER" \
            --preview out/copilot_advisory_v2_publication_preview.json \
            --policy-decision-id "policy:projects:copilot-advisory:${GITHUB_RUN_ID}" \
            --operator-decision approve \
            --execute \
            --confirm-plan-digest "$plan_digest" \
            --format json \
            > out/copilot_issue_comment_execute.json
          jq -e '
            .readback_verified == true
            and (.mutation_action == "created" or .mutation_action == "replay-noop")
          ' out/copilot_issue_comment_execute.json >/dev/null
