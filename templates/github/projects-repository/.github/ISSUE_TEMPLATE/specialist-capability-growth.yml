# Contract markers used by the local audit: specialist_ref capability operator decision remains local
name: Demander une évolution de capacité spécialiste
description: Demander une capacité nouvelle, affinée, dépréciée ou restaurée sans l'approuver dans GitHub.
title: "[Capacité spécialiste] "
labels: []
body:
  - type: markdown
    attributes:
      value: |
        Cette issue formule une demande de travail. Elle ne crée pas une révision approuvée.
        La décision opérateur reste locale dans Autodoc, puis SQL conserve l'historique durable.
        GitHub Projects reste une surface de demande et de revue non autoritative.

  - type: input
    id: specialist_ref
    attributes:
      label: Référence du spécialiste
      description: "Référence stable préfixée par specialist: ou llm:."
      placeholder: specialist:mechanical-design
    validations:
      required: true

  - type: input
    id: base_specialist_version
    attributes:
      label: Version de base du spécialiste
      description: Version portable servant de point de départ.
      placeholder: 1.2.0
    validations:
      required: true

  - type: dropdown
    id: action
    attributes:
      label: Action demandée
      options:
        - Ajouter
        - Affiner
        - Déprécier
        - Restaurer
    validations:
      required: true

  - type: input
    id: capability
    attributes:
      label: Capacité concernée
      description: Identifiant technique en minuscules, par exemple mechanical.design_review.
      placeholder: mechanical.design_review
    validations:
      required: true

  - type: textarea
    id: proposed_description
    attributes:
      label: Description de l'évolution demandée
      description: Décrire le comportement attendu, les limites et le résultat observable.
      placeholder: |
        Comportement attendu :
        Limites :
        Résultat observable :
    validations:
      required: true

  - type: textarea
    id: evidence_refs
    attributes:
      label: Preuves existantes
      description: Références typées, une par ligne. Elles peuvent rester vides au stade de la demande.
      placeholder: |
        report:benchmark-42
        test:specialist-review-smoke

  - type: textarea
    id: evidence_expectation
    attributes:
      label: Preuves à produire ou critères de validation
      description: Décrire les essais, observations ou rapports requis avant toute proposition formelle.
      placeholder: |
        Jeu de cas à couvrir :
        Critères d'acceptation :
        Régressions interdites :
    validations:
      required: true

  - type: textarea
    id: requested_input_contract_refs
    attributes:
      label: Contrats d'entrée demandés
      description: "Références contract: facultatives à ce stade, une par ligne."
      placeholder: contract:mechanical-design-request.v1

  - type: textarea
    id: requested_output_contract_refs
    attributes:
      label: Contrats de sortie demandés
      description: "Références contract: facultatives à ce stade, une par ligne."
      placeholder: contract:mechanical-design-review.v1

  - type: textarea
    id: requested_laboratory_capability_refs
    attributes:
      label: Capacités de laboratoire requises
      description: "Références laboratory-capability: facultatives, une par ligne."
      placeholder: laboratory-capability:cad-inspection

  - type: input
    id: conversation_ref
    attributes:
      label: Conversation
      description: "Référence conversation: facultative. Une référence GitHub déterministe sera créée si le champ est vide."
      placeholder: conversation:chalouf-design

  - type: textarea
    id: context_refs
    attributes:
      label: Contextes liés
      description: "Références context: ou sql:, une par ligne. Le ticket courant reste toujours un contexte implicite."
      placeholder: |
        context:chalouf
        sql:context-42

  - type: checkboxes
    id: copilot
    attributes:
      label: Avis Copilot
      options:
        - label: Produire également un avis Copilot séparé et non autoritatif

  - type: checkboxes
    id: authority_boundary
    attributes:
      label: Confirmation de frontière
      options:
        - label: Je comprends que la décision opérateur reste locale et que cette issue ne vaut ni approbation ni autorisation d'exécution.
          required: true
