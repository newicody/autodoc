name: Nouvelle recherche
description: Produire un nouveau résultat visible à partir de références sélectionnées.
title: "[Recherche] "
labels: []
body:
  - type: markdown
    attributes:
      value: |
        Cette issue est d'abord une action. Après traitement, la même issue
        devient le résultat courant visible dans le Board. Les résultats liés
        restent de simples références : leur contenu n'est pas dupliqué dans
        le formulaire ou dans le Board.

  - type: textarea
    id: question
    attributes:
      label: Question ou objectif
      description: Question principale à laquelle le résultat doit répondre.
      placeholder: Quelle question doit être étudiée ?
    validations:
      required: true

  - type: textarea
    id: expected_result
    attributes:
      label: Résultat attendu
      description: Forme, profondeur, critères et usage du résultat.
      placeholder: Synthèse, comparaison, dossier, proposition, code, plan...
    validations:
      required: true

  - type: input
    id: result_parent_ref
    attributes:
      label: Résultat parent facultatif
      description: |
        Lien vers le résultat précédent uniquement pour établir la filiation
        principale. Ce champ n'est pas une liste de sources.
      placeholder: https://github.com/newicody/projects/issues/42

  - type: textarea
    id: related_result_refs
    attributes:
      label: Résultats liés
      description: |
        Ajouter un lien ou une référence par ligne. Ces résultats sont des
        sources de contexte complémentaires et ne créent aucune carte dupliquée.
      placeholder: |
        https://github.com/newicody/projects/issues/18
        #31

  - type: textarea
    id: group_refs
    attributes:
      label: Groupes ou thèmes liés
      description: Ajouter un nom, une référence d'issue ou une URL par ligne.
      placeholder: |
        Chalouf
        #30
        Architecture réseau

  - type: textarea
    id: issue_refs
    attributes:
      label: Tickets liés
      description: Ajouter une référence GitHub ou une URL par ligne.
      placeholder: |
        #12
        https://github.com/example/project/issues/24

  - type: textarea
    id: repository_sources
    attributes:
      label: Dépôts et données internes
      description: |
        Décrire chaque dépôt avec sa révision et les chemins sélectionnés.
        Ne jamais sélectionner newicody/autodoc comme source de connaissance.
      placeholder: |
        repository: organisation/projet
        revision: branche, tag ou commit
        paths:
          - doc/
          - src/network/**/*.py

  - type: textarea
    id: attachments_and_links
    attributes:
      label: Pièces jointes et liens externes
      description: Déposer des fichiers ou ajouter une URL par ligne.
      placeholder: |
        Déposer ici les documents ou médias.
        https://example.org/source.pdf

  - type: textarea
    id: parameters_and_refinement
    attributes:
      label: Paramètres et précisions
      description: Contraintes, hypothèses, exclusions, niveau de détail et format.
      placeholder: |
        Contraintes :
        Hypothèses :
        Éléments à exclure :
        Format attendu :

  - type: dropdown
    id: context_mode
    attributes:
      label: Niveau de contexte
      options:
        - Complet
        - Condensé
        - Minimal
    validations:
      required: true

  - type: checkboxes
    id: copilot
    attributes:
      label: Avis Copilot
      options:
        - label: Produire également un avis Copilot séparé
