name: Nouveau groupe de contexte
description: Définir un groupe réutilisable comme source de futures recherches.
title: "[Groupe] "
labels: []
body:
  - type: markdown
    attributes:
      value: |
        Un groupe est une référence humaine réutilisable. Il n'est ni un
        résultat, ni une action de traitement, ni une route interne du serveur.

  - type: input
    id: group_name
    attributes:
      label: Nom du groupe
      placeholder: Chalouf
    validations:
      required: true

  - type: textarea
    id: group_definition
    attributes:
      label: Définition et périmètre
      description: Définir ce qui appartient ou non à ce groupe.
    validations:
      required: true

  - type: textarea
    id: member_issue_refs
    attributes:
      label: Tickets et résultats référencés
      description: Ajouter une référence ou une URL par ligne.
      placeholder: |
        #12
        #18
        https://github.com/newicody/projects/issues/24

  - type: textarea
    id: related_group_refs
    attributes:
      label: Groupes liés
      description: Ajouter un nom, une référence ou une URL par ligne.

  - type: textarea
    id: repository_sources
    attributes:
      label: Dépôts et données internes de référence
      placeholder: |
        repository: organisation/projet
        revision: branche, tag ou commit
        paths:
          - doc/

  - type: textarea
    id: attachments_and_links
    attributes:
      label: Pièces jointes et liens de référence
      description: Déposer des fichiers ou ajouter des URL.
