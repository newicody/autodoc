name: Nouveau thème de recherche
description: Créer une boîte thématique facultative regroupant plusieurs recherches.
title: "[Thème] "
labels: []
body:
  - type: markdown
    attributes:
      value: |
        Un thème est une boîte humaine et une source de contexte. Il ne choisit
        aucun laboratoire et n'impose aucune route interne au serveur.

  - type: input
    id: theme_name
    attributes:
      label: Nom du thème
      placeholder: Chalouf
    validations:
      required: true

  - type: textarea
    id: theme_definition
    attributes:
      label: Définition et périmètre
      description: Définir ce qui appartient ou non à ce thème.
    validations:
      required: true

  - type: textarea
    id: theme_question
    attributes:
      label: Recherche spécifique sur ce thème
      description: Question transversale à lancer lorsque le ticket de thème est utilisé.
      placeholder: Question facultative couvrant le thème entier.

  - type: textarea
    id: member_researches
    attributes:
      label: Tickets de recherche englobés
      description: Ajouter une référence ou une URL par ligne.
      placeholder: |
        #12
        #18
        https://github.com/newicody/projects/issues/24

  - type: textarea
    id: related_themes
    attributes:
      label: Thèmes liés
      description: Autres thèmes pouvant être sélectionnés dans un événement transversal.
      placeholder: Un nom ou une référence par ligne.

  - type: textarea
    id: theme_repositories
    attributes:
      label: Dépôts de référence du thème
      placeholder: Un dépôt ou une URL par ligne.

  - type: textarea
    id: theme_documents
    attributes:
      label: Documents et médias de référence
      description: Déposer des fichiers ou ajouter des URL.

  - type: dropdown
    id: default_context_mode
    attributes:
      label: Contexte par défaut
      options:
        - Complet
        - Condensé
        - Minimal
    validations:
      required: true

  - type: checkboxes
    id: external_inference
    attributes:
      label: Inférence externe
      options:
        - label: Autoriser la demande d'une inférence externe pour ce thème
