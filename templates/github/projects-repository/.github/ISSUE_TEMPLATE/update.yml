name: Actualiser un résultat
description: Ajouter un UPDATE horodaté sous un résultat existant.
title: "[Actualisation] "
labels: []
body:
  - type: markdown
    attributes:
      value: |
        Cette issue est une action séparée. Elle ne crée pas un nouveau
        résultat parent. Après traitement, le résultat cible reçoit un
        commentaire UPDATE horodaté et ses résumés visibles sont actualisés.

  - type: input
    id: update_target_ref
    attributes:
      label: Résultat cible
      description: Lien obligatoire vers le résultat courant à actualiser.
      placeholder: https://github.com/newicody/projects/issues/42
    validations:
      required: true

  - type: textarea
    id: update_objective
    attributes:
      label: Objet de l'actualisation
      description: Décrire ce qui doit être ajouté, corrigé ou réévalué.
    validations:
      required: true

  - type: textarea
    id: new_parameters
    attributes:
      label: Nouveaux paramètres
      description: Paramètres applicables uniquement à cette actualisation.
      placeholder: |
        Nouvelles contraintes :
        Hypothèses modifiées :
        Format attendu :

  - type: textarea
    id: related_result_refs
    attributes:
      label: Résultats liés
      description: Ajouter un lien ou une référence par ligne, sans duplication.
      placeholder: |
        https://github.com/newicody/projects/issues/18
        #31

  - type: textarea
    id: group_refs
    attributes:
      label: Groupes ou thèmes liés
      description: Ajouter un nom, une référence ou une URL par ligne.

  - type: textarea
    id: issue_refs
    attributes:
      label: Tickets liés
      description: Ajouter une référence GitHub ou une URL par ligne.

  - type: textarea
    id: repository_sources
    attributes:
      label: Dépôts et nouvelles données internes
      description: |
        Décrire chaque dépôt avec sa révision et les chemins ajoutés.
        Ne jamais sélectionner newicody/autodoc comme source de connaissance.
      placeholder: |
        repository: organisation/projet
        revision: branche, tag ou commit
        paths:
          - doc/architecture/
          - src/component.py

  - type: textarea
    id: attachments_and_links
    attributes:
      label: Nouvelles pièces jointes et nouveaux liens
      description: Déposer des fichiers ou ajouter une URL par ligne.

  - type: dropdown
    id: context_mode
    attributes:
      label: Niveau de contexte
      options:
        - Complet
        - Condensé
        - Minimal
    validations:
      required: true

  - type: checkboxes
    id: copilot
    attributes:
      label: Avis Copilot
      options:
        - label: Produire également un avis Copilot séparé
