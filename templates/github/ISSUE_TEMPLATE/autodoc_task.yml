name: Autodoc task
description: Produce a minimal ticket artifact for the local Autodoc server.
title: "[autodoc] "
labels:
  - autodoc:intake
body:
  - type: textarea
    id: task
    attributes:
      label: Ticket
      description: Describe the task to process.
    validations:
      required: true

  - type: dropdown
    id: column
    attributes:
      label: Colonne workflow
      options:
        - Backlog
        - Ready
        - Inference
        - Review
        - Done
    validations:
      required: true

  - type: checkboxes
    id: context_options
    attributes:
      label: Context options
      options:
        - label: include_current_ticket
        - label: include_total_project
        - label: include_repository_context
        - label: include_linked_tickets
        - label: include_recent_artifacts

  - type: dropdown
    id: requested_depth
    attributes:
      label: requested_depth
      options:
        - light
        - normal
        - deep
    validations:
      required: true
